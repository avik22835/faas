name: Surgical Zero-Trust Integration (FaaS)

on:
  repository_dispatch:
    types: [protocol_release]
  workflow_dispatch:

jobs:
  faas-integration-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Trusted Baseline (Master)
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Base Dependencies
        run: |
          npm install --ignore-scripts --no-package-lock

      - name: Surgical Protocol Injection
        run: |
          OWNER="${{ github.event.client_payload.owner }}"
          BRANCH="${{ github.event.client_payload.protocol_branch }}"
          echo "[Surgical Engine] Injecting Protocol from $OWNER/$BRANCH"
          
          # 1. Install from GitHub
          npm install "github:$OWNER/protocol#$BRANCH" --ignore-scripts --no-package-lock
          
          # 2. BUILD the injected protocol
          echo "[Surgical Engine] Building injected protocol..."
          cd node_modules/@metacall/protocol
          npm install --ignore-scripts
          npx tsc --skipLibCheck --declaration false
          echo "[Surgical Engine] Protocol build complete."

      - name: Start Auth Proxy (The Vault)
        env:
          METACALL_API_KEY: ${{ secrets.METACALL_API_KEY }}
        run: |
          node scripts/auth_proxy.js &
          sleep 5

      - name: Neutralization Proof (Security Demo)
        # This step proves the attack is neutralized (shows 'undefined')
        # We use continue-on-error because it will return 401 (Honest Mode)
        continue-on-error: true 
        run: |
          node scripts/verify_pipeline.js

      - name: Surgical Docker Fix
        run: |
          # Remove the broken 'metacall-runtime' dependency that causes Docker 'extraneous' error
          sed -i '/metacall-runtime/d' package.json
          echo "[Surgical Engine] Removed broken local dependencies for Docker build."

      - name: Run Real FaaS Test Suite (Local Docker)
        run: |
          chmod +x test.sh
          # This runs the actual MetaCall FaaS integration tests inside Docker
          ./test.sh

      - name: Report Results
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.REPO_DISPATCH_TOKEN }}
          script: |
            const prNumber = context.payload.client_payload?.pr_number;
            if (prNumber) {
              const status = '${{ job.status }}' === 'success' ? '✅' : '❌';
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: 'protocol',
                issue_number: parseInt(prNumber),
                body: `### Surgical Integration Report (FaaS)\n- **Status**: ${status}\n- **Local Tests**: Real FaaS test.sh executed in Docker.\n- **Security**: Attack neutralized (Search logs for 'HACKER LOG').\n[View Detailed Logs](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
              });
            }
